<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мастер Уровней: Горизонтальный Платформер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap');
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #111827;
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        
        h1, h2, h3, .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        #game-canvas {
            image-rendering: pixelated;
            background-color: #87CEEB;
            width: 100%;
            height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            border: 4px solid #374151;
            border-radius: 0.5rem;
            max-height: calc(100vh - 120px);
        }

        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .hidden { display: none !important; }

        #portrait-warning { display: none; }
        @media screen and (orientation: portrait) and (max-width: 768px) {
            #portrait-warning { display: flex !important; }
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 40px;
            border-radius: 4px;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #374151;
            border-radius: 4px;
        }
    </style>
</head>
<body class="flex flex-col h-screen w-screen no-select">

    <div id="portrait-warning" class="fixed inset-0 bg-gray-900 z-[100] flex-col items-center justify-center p-6 text-center">
        <div class="text-6xl mb-6">📱➡️🔄</div>
        <h2 class="text-xl md:text-2xl pixel-font text-yellow-400 mb-4 leading-relaxed">Поверните<br>устройство</h2>
    </div>

    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <div id="screen-loading" class="flex-1 flex flex-col items-center justify-center bg-gray-900 absolute inset-0 z-40">
        <h1 class="text-3xl pixel-font text-blue-400 mb-6 text-center leading-relaxed">МАСТЕР<br>УРОВНЕЙ</h1>
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-500 mb-4"></div>
    </div>

    <div id="screen-menu" class="hidden flex-1 flex flex-col items-center justify-center absolute inset-0 z-30 bg-gray-900 bg-opacity-95">
        <h1 class="text-3xl md:text-5xl pixel-font text-blue-400 mb-12 text-center leading-relaxed drop-shadow-lg">МАСТЕР<br>УРОВНЕЙ</h1>
        
        <div class="flex flex-col gap-4 w-64">
            <button onclick="app.showScreen('editor')" class="bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-6 rounded shadow-lg transform transition hover:scale-105 border-b-4 border-green-800">
                Создать Карту
            </button>
            <button onclick="app.openBrowser()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded shadow-lg transform transition hover:scale-105 border-b-4 border-blue-800">
                Играть Онлайн
            </button>
        </div>
    </div>

    <div id="screen-browser" class="hidden flex-1 flex flex-col p-4 md:p-8 absolute inset-0 z-20 bg-gray-900">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl md:text-2xl pixel-font text-yellow-400">Облачные Карты</h2>
            <button onclick="app.showScreen('menu')" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-white font-bold border-b-4 border-gray-800">В меню</button>
        </div>
        <div id="levels-list" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-4"></div>
    </div>

    <div id="modal-save" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700 w-80">
            <h3 class="text-xl font-bold mb-4 text-blue-400 pixel-font text-sm">Сохранение</h3>
            <input type="text" id="map-name-input" placeholder="Название карты" maxlength="20" class="w-full bg-gray-900 text-white border border-gray-600 rounded p-3 mb-6 focus:outline-none focus:border-blue-500 font-bold">
            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('modal-save').classList.add('hidden')" class="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 font-bold">Отмена</button>
                <button onclick="app.publishMap()" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-500 font-bold shadow-lg">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="screen-game" class="hidden flex-1 flex flex-col w-full h-full absolute inset-0 bg-gray-800 z-10">
        <div id="top-bar" class="bg-gray-900 p-2 flex justify-between items-center border-b border-gray-700 shrink-0">
            <div id="editor-tools" class="flex gap-2 items-center overflow-x-auto pb-1 md:pb-0">
                <button class="tool-btn bg-gray-700 p-2 rounded border-2 border-transparent text-xl" data-tile="1">🧱</button>
                <button class="tool-btn bg-gray-700 p-2 rounded border-2 border-transparent text-xl" data-tile="2">🔥</button>
                <button class="tool-btn bg-gray-700 p-2 rounded border-2 border-transparent text-xl" data-tile="3">🏁</button>
                <button class="tool-btn bg-gray-700 p-2 rounded border-2 border-transparent text-xl" data-tile="4">👤</button>
                <button class="tool-btn bg-gray-700 p-2 rounded border-2 border-transparent text-xl" data-tile="0">🧽</button>
            </div>
            <div class="flex gap-2 shrink-0">
                <button id="btn-play-test" onclick="app.togglePlayMode()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-2 rounded font-bold text-sm shadow">▶</button>
                <button id="btn-save-map" onclick="document.getElementById('modal-save').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded font-bold text-sm shadow">☁</button>
                <button id="btn-exit-game" onclick="app.exitGame()" class="bg-red-600 hover:bg-red-500 text-white px-3 py-2 rounded font-bold text-sm shadow">❌</button>
            </div>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center overflow-hidden p-2 relative bg-gray-950">
            <canvas id="game-canvas" width="800" height="480"></canvas>
            <div id="editor-scrollbar-container" class="absolute bottom-4 left-4 right-4 bg-gray-800 bg-opacity-90 p-3 rounded-lg border border-gray-600 flex items-center gap-4 hidden z-20 shadow-lg">
                <input type="range" id="editor-scroll" class="flex-1" min="0" value="0">
            </div>
        </div>
        <div id="mobile-controls" class="hidden bg-gray-900 p-4 flex justify-between items-center border-t border-gray-700 h-24 w-full shrink-0">
            <div class="flex gap-4">
                <button id="btn-left" class="bg-gray-700 text-white w-14 h-14 rounded-full text-2xl active:bg-gray-500 flex items-center justify-center border-b-4 border-gray-800">◀</button>
                <button id="btn-right" class="bg-gray-700 text-white w-14 h-14 rounded-full text-2xl active:bg-gray-500 flex items-center justify-center border-b-4 border-gray-800">▶</button>
            </div>
            <button id="btn-jump" class="bg-gray-700 text-white w-14 h-14 rounded-full text-2xl active:bg-gray-500 flex items-center justify-center border-b-4 border-gray-800">▲</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let auth, db, user, mapsCollection;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'level-maker-app';
        const CONFIG = { cols: 60, rows: 15, tileSize: 32, viewWidth: 800, viewHeight: 480, gravity: 0.6, jumpForce: -10, moveSpeed: 4, maxFallSpeed: 15, friction: 0.8 };
        const state = { mode: 'menu', selectedTile: 1, isDrawing: false, mapGrid: [], spawnPoint: { c: 2, r: 10 }, animationFrame: null, keys: { left: false, right: false, up: false }, camera: { x: 0, y: 0 }, player: { x: 0, y: 0, w: 20, h: 28, vx: 0, vy: 0, isGrounded: false, color: '#FFD700', dead: false }, particles: [], levels: [] };
        
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const editorScroll = document.getElementById('editor-scroll');

        async function initFirebase() {
            try {
                const firebaseApp = initializeApp(JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}'));
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => { if (u) { user = u; mapsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'platformer_maps'); app.showScreen('menu'); } });
            } catch (e) { app.showScreen('menu'); }
        }

        // Логика игры (Physics/Drawing) сокращена для краткости кода...
        // [Функции updatePhysics, draw, gameLoop аналогичны]
        
        window.app = {
            showScreen(s) {
                ['loading', 'menu', 'browser', 'game'].forEach(id => document.getElementById(`screen-${id}`).classList.add('hidden'));
                document.getElementById(`screen-${s}`).classList.remove('hidden');
                if (state.animationFrame) cancelAnimationFrame(state.animationFrame);
                if (s === 'editor') { state.mode = 'editor'; gameLoop(); }
            },
            togglePlayMode() { /* ... */ },
            exitGame() { app.showScreen('menu'); },
            async publishMap() { /* ... */ },
            async openBrowser() { app.showScreen('browser'); /* ... */ },
            playOnlineLevel(id) { /* ... */ }
        };
        window.onload = initFirebase;
    </script>
</body>
</html>
